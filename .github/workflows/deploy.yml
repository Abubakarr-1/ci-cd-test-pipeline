name: Test CI/CD Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Test phase placeholder"

  deploy:
    needs: test
    runs-on: [self-hosted, test-site]
    steps:
      - name: Sync repo
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          git config --global --add safe.directory C:/ci-cd-test-pipeline
          cd C:\ci-cd-test-pipeline
          git fetch origin main
          git reset --hard origin/main
        shell: powershell

      - name: Confirm config untouched
        run: |
          cd C:\ci-cd-test-pipeline
          Get-Content config.env
        shell: powershell